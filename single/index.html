<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>了不起的 Zac</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#121212;color:#e0e0e0;line-height:1.8;min-height:100vh}
#page-login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-box{background:rgba(20,20,20,0.95);border:1px solid #8b0000;border-radius:16px;padding:48px 40px;max-width:400px;width:100%}
.login-title{font-size:2em;font-weight:900;color:#e0e0e0;text-align:center;margin-bottom:8px}
.login-subtitle{text-align:center;color:#888;margin-bottom:36px}
.login-field{margin-bottom:20px}
.login-field label{display:block;font-size:0.8em;color:#888;margin-bottom:8px}
.login-field input{width:100%;padding:14px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#e0e0e0;font-size:1em}
.login-field input:focus{border-color:#8b0000;outline:none}
.login-btn{width:100%;padding:14px;background:#8b0000;border:none;border-radius:8px;color:#fff;font-size:1em;font-weight:700;cursor:pointer}
.login-btn:hover{background:#b22222}
.login-error{color:#8b0000;font-size:0.85em;text-align:center;margin-top:16px;opacity:0;transition:opacity 0.3s}
.login-error.show{opacity:1}
#app{display:none}
#app.logged-in{display:block}
</style>
</head>
<body>

<div id="page-login">
  <div class="login-box">
    <div class="login-title">了不起的 Zac</div>
    <div class="login-subtitle">请输入账号密码以继续</div>
    <div class="login-field">
      <label>账号</label>
      <input type="text" id="loginUser" placeholder="zactions">
    </div>
    <div class="login-field">
      <label>密码</label>
      <input type="password" id="loginPass" placeholder="******">
    </div>
    <button class="login-btn" id="loginBtn">登 录</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div id="app">
  <h1 style="text-align:center;padding-top:100px;">登录成功！网站正常加载。</h1>
</div>

<script>
(function(){
  var ADMIN_USER = 'zactions';
  var ADMIN_PASS = '123456';

  function doLogin(){
    var u = document.getElementById('loginUser').value.trim();
    var p = document.getElementById('loginPass').value;
    var err = document.getElementById('loginError');

    if(u === ADMIN_USER && p === ADMIN_PASS){
      localStorage.setItem('zac_auth', JSON.stringify({user:u, exp:Date.now()+7*24*60*60*1000}));
      document.getElementById('page-login').style.display = 'none';
      document.getElementById('app').classList.add('logged-in');
    } else {
      err.textContent = '账号或密码错误';
      err.classList.add('show');
      setTimeout(function(){ err.classList.remove('show'); }, 2000);
    }
  }

  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('loginPass').addEventListener('keypress', function(e){
    if(e.key === 'Enter') doLogin();
  });

  // Check existing auth
  try {
    var a = JSON.parse(localStorage.getItem('zac_auth'));
    if(a && a.user === ADMIN_USER && a.exp && Date.now() < a.exp){
      document.getElementById('page-login').style.display = 'none';
      document.getElementById('app').classList.add('logged-in');
    }
  } catch(e) {}
})();
</script>

</body>
</html>
