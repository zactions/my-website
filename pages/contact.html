<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>联系我 - 我的网站</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
  <h1>📬 联系我</h1>
  <p>期待与你交流</p>
</header>

<nav>
  <a href="../index.html">首页</a>
  <a href="about.html">关于</a>
  <a href="services.html">服务</a>
  <a href="contact.html">联系</a>
</nav>

<div class="container">
  <section>
    <h2>联系方式</h2>
    <p class="section-desc">
      欢迎通过以下方式与我取得联系，期待与你交流！
    </p>
  </section>

  <section style="margin-top: 32px;">
    <div class="cards">
      <div class="card">
        <h3>📧 邮箱</h3>
        <p>your@email.com</p>
      </div>
      <div class="card">
        <h3>💬 微信</h3>
        <p>your_wechat_id</p>
      </div>
      <div class="card">
        <h3>🐙 GitHub</h3>
        <p>github.com/yourusername</p>
      </div>
    </div>
  </section>

  <section style="margin-top: 48px;">
    <h2>留言</h2>
    <form style="margin-top: 16px; display: flex; flex-direction: column; gap: 16px; max-width: 500px;">
      <input type="text" placeholder="你的名字" style="padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 1em;">
      <input type="email" placeholder="你的邮箱" style="padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 1em;">
      <textarea placeholder="你的留言" rows="5" style="padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 1em; resize: vertical;"></textarea>
      <button type="button" class="btn" style="align-self: flex-start;">发送留言</button>
    </form>
    <p style="margin-top: 12px; color: #999; font-size: 0.9em;">* 此为前端演示表单，需配合后端服务实现真正发送功能。</p>
  </section>
</div>

<footer>
  <p>© 2026 我的网站 · 由 QClaw 搭建</p>
</footer>

<script src="../js/main.js"></script>
</body>
</html>
